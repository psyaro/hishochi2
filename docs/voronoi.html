<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全国駅ボロノイ標高地図 — 最低標高</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #111;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── ヘッダー ── */
    header {
      flex-shrink: 0;
      background: #18181b;
      border-bottom: 1px solid #2a2a2e;
      padding: 10px 18px;
      display: flex;
      align-items: baseline;
      gap: 14px;
      z-index: 1000;
    }
    header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      background: linear-gradient(90deg, #60c8ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }
    header p {
      font-size: 0.75rem;
      color: #888;
    }
    header a {
      font-size: 0.75rem;
      color: #60c8ff;
      text-decoration: none;
      margin-left: auto;
      white-space: nowrap;
    }
    header a:hover { text-decoration: underline; }

    /* ── 地図 ── */
    #map {
      flex: 1;
      min-height: 0;
    }

    /* ── ポップアップ ── */
    .leaflet-popup-content-wrapper {
      background: #18181b;
      color: #f0f0f0;
      border: 1px solid #333;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      padding: 0;
    }
    .leaflet-popup-tip { background: #18181b; }
    .popup-inner { padding: 12px 16px; min-width: 190px; }
    .popup-inner .p-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .popup-inner .p-line { font-size: 0.78rem; color: #aaa; margin-bottom: 8px; }
    .popup-inner .p-elev { display: flex; gap: 16px; }
    .popup-inner .p-val  { display: flex; flex-direction: column; }
    .popup-inner .p-label{ font-size: 0.68rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    .popup-inner .p-num  { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
    .popup-inner .p-unit { font-size: 0.75rem; color: #888; }

    /* ── 凡例 ── */
    .legend {
      position: absolute;
      bottom: 24px;
      right: 10px;
      z-index: 900;
      background: rgba(24,24,27,0.92);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 130px;
      pointer-events: none;
    }
    .legend h3 {
      font-size: 0.72rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .legend-bar {
      width: 100%;
      height: 14px;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: #aaa;
    }

    /* ── ローディング ── */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      background: rgba(24,24,27,0.95);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 28px 40px;
      text-align: center;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #60c8ff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    #loading p { font-size: 0.9rem; color: #ccc; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>全国駅ボロノイ標高地図</h1>
  <p>各駅の最低標高（250mメッシュ）でボロノイ領域を色分け</p>
  <a href="index.html">← 標高検索に戻る</a>
</header>

<div id="map">
  <div id="loading">
    <div class="spinner"></div>
    <p>地図データを読み込み中…</p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 標高 → カラー変換 ─────────────────────────────────────────────────────
// 制御点: [標高m, [R, G, B]]
const COLOR_STOPS = [
  [-10,  [ 20,  40, 120]],  // 海面以下: 紺青
  [  0,  [ 20,  80, 160]],  // 0m: 青
  [  5,  [ 30, 130,  80]],  // 5m: 濃緑
  [ 30,  [ 80, 170,  70]],  // 30m: 緑
  [100,  [180, 220,  80]],  // 100m: 黄緑
  [300,  [230, 200,  60]],  // 300m: 黄
  [600,  [200, 130,  40]],  // 600m: 橙褐
  [1000, [160,  80,  30]],  // 1000m: 赤褐
  [1640, [220, 200, 190]],  // 1640m: 薄灰白 (最高: 黒部平)
];

function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

function elevToColor(elev) {
  if (elev === null || elev === undefined) return 'rgba(80,80,80,0.4)';
  const stops = COLOR_STOPS;
  if (elev <= stops[0][0]) return `rgb(${stops[0][1].join(',')})`;
  if (elev >= stops[stops.length-1][0]) {
    const c = stops[stops.length-1][1];
    return `rgb(${c.join(',')})`;
  }
  for (let i = 0; i < stops.length - 1; i++) {
    const [e0, c0] = stops[i];
    const [e1, c1] = stops[i+1];
    if (elev >= e0 && elev <= e1) {
      const t = (elev - e0) / (e1 - e0);
      const c = lerpColor(c0, c1, t);
      return `rgb(${c.join(',')})`;
    }
  }
}

// ── Leaflet 地図の初期化 ────────────────────────────────────────────────────
const map = L.map('map', {
  center: [36.35, 138.60],  // 軽井沢付近
  zoom: 12,                  // 約30km四方
  zoomControl: true,
  attributionControl: true,
});

// ベースマップ: CartoDB Positron (明るいグレー系でポリゴンが映える)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ── GeoJSON 読み込みと描画 ───────────────────────────────────────────────────
let voronoiLayer = null;

fetch('data/voronoi.geojson')
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    document.getElementById('loading').style.display = 'none';

    voronoiLayer = L.geoJSON(data, {
      style: feature => {
        const elev = feature.properties.min;
        return {
          fillColor:   elevToColor(elev),
          fillOpacity: 0.65,
          color:       'rgba(0,0,0,0.08)',
          weight:      0.4,
        };
      },
      onEachFeature: (feature, layer) => {
        const p = feature.properties;
        const minStr = p.min !== null ? `${p.min.toFixed(1)}<span class="p-unit"> m</span>` : 'N/A';
        const avgStr = p.avg !== null ? `${p.avg.toFixed(1)}<span class="p-unit"> m</span>` : 'N/A';
        const tempStr = p.temp !== null ? `${p.temp.toFixed(1)}<span class="p-unit"> ℃</span>` : 'N/A';
        const sqmStr = p.sqm !== null ? `${p.sqm.toFixed(2)}<span class="p-unit"> mag</span>` : 'N/A';
        const color  = elevToColor(p.min);

        layer.bindPopup(`
          <div class="popup-inner">
            <div class="p-name" style="color:${color}">${p.name}</div>
            <div class="p-line">${p.line}（${p.op}）</div>
            <div class="p-elev">
              <div class="p-val">
                <span class="p-label">最低標高</span>
                <span class="p-num" style="color:${color}">${minStr}</span>
              </div>
              <div class="p-val">
                <span class="p-label">平均標高</span>
                <span class="p-num">${avgStr}</span>
              </div>
            </div>
            <div class="p-elev" style="margin-top: 8px; border-top: 1px solid #333; padding-top: 8px;">
              <div class="p-val" style="width: 50%;">
                <span class="p-label">8月最高気温</span>
                <span class="p-num" style="color:#ffb199">${tempStr}</span>
              </div>
              <div class="p-val" style="width: 50%; padding-left: 8px; border-left: 1px solid #333;">
                <span class="p-label">星空の明るさ</span>
                <span class="p-num" style="color:#a78bfa">${sqmStr}</span>
              </div>
            </div>
            <div style="margin-top: 8px; border-top: 1px dashed #444; padding-top: 8px; font-size: 0.68rem; color: #888; text-align: center; font-style: italic;">
              🖱️ ダブルクリックで Google Map を開く
            </div>
          </div>
        `, { maxWidth: 260 });

        layer.on('mouseover', e => {
          e.target.setStyle({ fillOpacity: 0.88, weight: 1.2, color: '#fff' });
        });
        layer.on('mouseout', e => {
          voronoiLayer.resetStyle(e.target);
        });
        layer.on('dblclick', e => {
          L.DomEvent.stopPropagation(e);
          const center = layer.getBounds().getCenter();
          const url = `https://www.google.com/maps/search/?api=1&query=${center.lat},${center.lng}`;
          window.open(url, '_blank');
        });
      },
    }).addTo(map);

    // ── 駅位置を小さい黒点で描画（Canvas レンダラーで高速化）──────────
    const canvasRenderer = L.canvas({ padding: 0.5 });
    const stationDots = L.layerGroup();
    voronoiLayer.eachLayer(layer => {
      const center = layer.getBounds().getCenter();
      L.circleMarker(center, {
        renderer:    canvasRenderer,
        radius:      2.5,
        color:       '#000',
        weight:      0,
        fillColor:   '#333',
        fillOpacity: 0.4,
        interactive: false,
      }).addTo(stationDots);
    });
    stationDots.addTo(map);

    // ズームに応じてドットサイズを動的に変更
    map.on('zoomend', () => {
      const z = map.getZoom();
      const r = 2;
      stationDots.eachLayer(l => l.setRadius(r));
    });
  })
  .catch(err => {
    document.getElementById('loading').innerHTML =
      `<p style="color:#f87171">読み込みエラー: ${err.message}</p>`;
  });

// ── 凡例 ────────────────────────────────────────────────────────────────────
const legendDiv = L.control({ position: 'bottomright' });
legendDiv.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');

  // グラデーションバーを CSS で生成
  const gradStops = COLOR_STOPS.map(([, c]) => `rgb(${c.join(',')})`).join(',');
  const labels = COLOR_STOPS
    .filter((_, i) => i % 2 === 0)
    .map(([e]) => `${e >= 0 ? e : e}m`);

  div.innerHTML = `
    <h3>最低標高</h3>
    <div class="legend-bar"
         style="background: linear-gradient(to right, ${gradStops})"></div>
    <div class="legend-labels">
      <span>${COLOR_STOPS[0][0]}m</span>
      <span>${COLOR_STOPS[Math.floor(COLOR_STOPS.length/2)][0]}m</span>
      <span>${COLOR_STOPS[COLOR_STOPS.length-1][0]}m</span>
    </div>
  `;
  return div;
};
legendDiv.addTo(map);

// ── 出典表記 ─────────────────────────────────────────────────────────────────
map.attributionControl.addAttribution(
  '標高: <a href="https://nlftp.mlit.go.jp/ksj/gml/datalist/KsjTmplt-G04-d.html" target="_blank">国土数値情報 G04-d（国土交通省）</a>'
);
</script>
</body>
</html>
